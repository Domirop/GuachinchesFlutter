name: guachinches
description: A new Flutter application.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 4.5.0+93

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  carousel_slider: ^5.1.1
  app_links: ^3.0.0
  story_view: ^0.13.2
  bottom_sheet: ^4.0.4
  share_plus: ^12.0.1
  image: ^3.0.1
  youtube_player_iframe: ^5.2.2
  photo_view: ^0.15.0
  image_picker: ^0.8.4+4
  google_mobile_ads: ^6.0.0
  firebase_core:  ^2.17.0
  firebase_remote_config: ^4.3.8
  firebase_messaging: ^14.7.10
  aws_s3_upload: ^1.5.0
  chewie: ^1.7.5
  video_player: ^2.7.2
  audioplayers: ^6.1.0
  confetti: ^0.7.0
  geolocator: ^13.0.0
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.0
  flutter_spinkit: ^5.2.0
  video_thumbnail: ^0.5.3
  video_compress: ^3.1.2
  maps_launcher: ^3.0.0+1
  file_picker: ^8.0.7
  qr_flutter: ^4.0.0
  youtube_player_flutter: ^8.1.2
  http: ^0.13.4
  flutter_dotenv: ^5.0.2
  flutter_cache_manager: ^3.3.0
  sqflite: ^2.0.0+3
  flutter_bloc: 8.1.3
  path_provider: ^2.0.10
  flutter_svg: ^2.0.9
  animated_text_kit: ^4.2.2
  tiktoklikescroller: ^0.2.6
  flutter_secure_storage: ^9.2.4
  flutter_rating_bar: ^4.0.0
  pinch_zoom: ^1.0.0
  modal_bottom_sheet: ^3.0.0
  webview_flutter: ^4.13.0
  uuid: ^4.0.0
  google_maps_flutter: ^2.5.3
  firebase_analytics: ^10.5.1
  firebase_crashlytics: ^3.4.8
  avatar_glow: ^2.0.2
  cached_network_image: ^3.2.1
  crypto: ^3.0.3
  device_info_plus: ^9.1.0
  # Pinned to <6.2.0 (uses GoogleSignIn ~> 7.x) for compatibility with Firebase 10.25
  # which requires GoogleUtilities ~> 7.x. google_sign_in >=6.2 pulls GoogleSignIn 8
  # → AppCheckCore 11 → GoogleUtilities 8 and breaks Firebase pods.
  # Revisit when Firebase is bumped to v11.
  google_sign_in: ">=6.1.0 <6.2.0"
  sign_in_with_apple: ^6.1.0
  connectivity_plus: ^5.0.2
  posthog_flutter: ^5.26.0

dependency_overrides:
  flutter_inappwebview: ^6.0.0-beta.30
  # google_sign_in_ios 5.8+ bumped to GoogleSignIn 8 (requires GoogleUtilities 8),
  # which conflicts with Firebase 10.25 (locked to GoogleUtilities 7). Hold the
  # iOS plugin at 5.7.x. Remove this when Firebase is bumped to v11+.
  google_sign_in_ios: ">=5.7.0 <5.8.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol_finders: ^3.4.0
  flutter_launcher_icons: ^0.9.0
  change_app_package_name: ^1.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  generate: true

  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/new-home/
    - assets/images/backgrounds/
    - assets/images/backgrounds/ddc_island_bg/
    - assets/audio/
    - env_files/
  fonts:
    - family: YourCustomFont
      fonts:
        - asset: assets/fonts/TimesNewRoman.ttf
        - asset: assets/fonts/TimesNewRomanBold.ttf
          weight: 700
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Variable.ttf
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Regular.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
flutter_icons:
  ios: true
  android: true
  image_path_ios: "assets/launcher/app-icon-initial.png"
  image_path_android: "assets/launcher/app-icon-initial.png"
  adaptive_icon_background: "assets/launcher/bg-icon.png"
  adaptive_icon_foreground: "assets/launcher/content-icon.png"
